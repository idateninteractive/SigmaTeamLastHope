<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #1b2838; font-family: Arial, sans-serif; color: #c6d4df; }
        
        /* Header */
        .header_wrapper { background-color: #171a21; padding: 20px 0; border-bottom: 2px solid #66c0f4; }
        .content { max-width: 940px; margin: 0 auto; display: flex; align-items: center; }
        .logo { font-size: 28px; font-weight: bold; color: #ffffff; margin-right: 40px; }
        
        .nav_area { display: flex; align-items: center; gap: 30px; }
        .nav_links { display: flex; gap: 20px; }
        .nav_links a { color: #c6d4df; text-decoration: none; text-transform: uppercase; font-size: 14px; font-weight: bold; }

        .search_box { display: flex; background-color: #316886; border-radius: 2px; }
        .search_box input { background: transparent; border: none; padding: 5px 10px; color: white; width: 120px; outline: none; }
        .search_box button { background: #66c0f4; border: none; padding: 5px 10px; cursor: pointer; color: #171a21; font-weight: bold; }

        /* Game Grid: Set to show exactly 4 items per row */
        .game_container { max-width: 940px; margin: 30px auto; }
        .game_grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .game_card { background: #16202d; padding: 10px; border: 1px solid #000; transition: transform 0.2s; }
        .game_card:hover { transform: scale(1.03); background: #1a293a; cursor: pointer; }
        .game_img { width: 100%; height: 120px; background: #333; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; color: #66c0f4; }
        .game_title { font-weight: bold; color: #fff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game_price { color: #66c0f4; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header_wrapper">
        <div class="content">
            <div class="logo">XSTEAM</div>
            <div class="nav_area">
                <nav class="nav_links">
                    <a href="#">Store</a>
                    <a href="#">Community</a>
                    <a href="#">About</a>
                    <a href="#">Support</a>
                </nav>
                <div class="search_box">
                    <input type="text" placeholder="Search...">
                    <button>🔍</button>
                </div>
            </div>
        </div>
    </div>

    <div class="game_container">
        <div class="game_grid">
            <!-- 4 Game Cards -->
            <div class="game_card">
                <div class="game_img">IMG 1</div>
                <div class="game_title">Cyber Neon Runner</div>
                <div class="game_price">$19.99</div>
            </div>
            <div class="game_card">
                <div class="game_img">IMG 2</div>
                <div class="game_title">Galactic Conquest</div>
                <div class="game_price">$29.99</div>
            </div>
            <div class="game_card">
                <div class="game_img">IMG 3</div>
                <div class="game_title">Mystery of the Void</div>
                <div class="game_price">$9.99</div>
            </div>
            <div class="game_card">
                <div class="game_img">IMG 4</div>
                <div class="game_title">Tactical Squad</div>
                <div class="game_price">$49.99</div>
            </div>
        </div>
    </div>

</body>
</html>
