<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Team</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Video Container -->
    <div class="video-container">
        <!-- Aapko ek heavy 4K moving sky/mountain video assets folder me dalni hogi -->
        <video autoplay loop muted playsinline class="bg-video">
            <source src="assets/mountain-sky.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <nav class="navbar">
                <div class="logo">SIGMA</div>
                <ul class="nav-links">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#work">Our Work</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="hero-section" id="home">
            <div class="hero-text">
                <h1 class="title">SIGMA TEAM</h1>
                <p class="subtitle">Where Strength Meets Strategy. We Rule The Peaks.</p>
                <a href="#explore" class="btn">Explore Elite</a>
            </div>
        </section>
    </main>

</body>
</html>
