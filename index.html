<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigmaTeam | Free Games Download</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d1117; color: #ffffff; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #161b22; padding: 15px 4%; border-bottom: 2px solid #21262d; position: sticky; top: 0; z-index: 100; }
        .nav-logo { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 40px; height: 40px; object-fit: cover; border-radius: 8px; }
        .logo-text { font-size: 22px; font-weight: 800; color: #fff; }
        .search-box input { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; width: 200px; }
        .main-container { padding: 40px 4%; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .game-card { background-color: #161b22; border: 1px solid #21262d; border-radius: 12px; overflow: hidden; }
        .game-thumbnail { width: 100%; height: 180px; background-size: cover; background-position: center; }
        .game-info { padding: 20px; }
        .game-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; min-height: 45px; }
        .download-btn { display: block; text-align: center; background: linear-gradient(45deg, #0066ff, #00d2ff); color: #fff; padding: 10px; border-radius: 6px; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <img src="https://archive.org/download/dialog_icon_08_202607/dialog_icon_08.png" alt="SigmaTeam Logo" class="logo-img">
            <div class="logo-text">SigmaTeam</div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchGames()" placeholder="Search games...">
        </div>
    </header>

    <main class="main-container">
        <div class="games-grid" id="gamesGrid">
    </main>

    <script>
        function searchGames() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.game-title').innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
