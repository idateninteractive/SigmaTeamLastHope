<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Team</title>
    <!-- Premium Gaming Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Set your main logo background here */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* --- LEFT SIDEBAR NAV --- */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 2px solid #ff0000;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 10;
            box-shadow: 5px 0 25px rgba(255, 0, 0, 0.15);
        }

        /* Left sidebar top main logo area */
        .logo-area {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.2);
        }

        .logo-img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            border-radius: 4px;
        }

        /* Sidebar Menu links wrapper */
        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
        }

        .menu-links li {
            width: 100%;
        }

        /* Custom style for all Image-based Buttons */
        .image-link {
            display: block;
            text-align: center;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 5px;
            text-decoration: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-btn-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .image-link:hover, .image-link:focus, .image-link.active {
            background: linear-gradient(90deg, rgba(255, 0, 0, 0.15), transparent);
            transform: translateX(5px);
            outline: none;
        }

        .image-link:hover .custom-btn-img, 
        .image-link:focus .custom-btn-img,
        .image-link.active .custom-btn-img {
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.7));
        }

        /* --- MAIN CONTENT AREA (RIGHT SIDE) --- */
        .main-content {
            margin-left: 280px; 
            width: calc(100% - 280px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 40px;
        }

        /* Central container - Logo stays at the top without gaps */
        .welcome-card {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            padding: 0px 0px 30px 0px; 
            background: transparent; 
            overflow: hidden; 
        }

        /* Logo styling for extreme top alignment */
        .content-logo-img {
            max-width: 100%;
            height: auto;
            margin-top: 0px; 
            margin-bottom: 20px; 
            display: block; 
            margin-left: auto;
            margin-right: auto;
            vertical-align: top; 
        }

        /* --- NEW DARK & RED TEXT COLUMN --- */
        .text-column {
            background: linear-gradient(135deg, rgba(20, 0, 0, 0.9) 0%, rgba(5, 5, 5, 0.95) 100%);
            border: 1px solid #990000;
            border-left: 4px solid #ff0000; /* Vibrant red heavy line indicator on the left side */
            padding: 25px;
            margin: 0 20px; /* Some breathing room on the sides */
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.15), 0 10px 30px rgba(0, 0, 0, 0.7);
            text-align: left; /* Left-aligned text for readability */
        }

        .text-column p {
            font-size: 1.2rem;
            color: #e0e0e0;
            line-height: 1.6;
            letter-spacing: 0.8px;
            font-family: 'Rajdhani', sans-serif;
        }

        /* Footer */
        footer {
            text-align: center;
            font-size: 0.85rem;
            color: #444444;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-top: 40px;
        }

        /* Responsive Settings for Mobile */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 2px solid #ff0000;
                padding: 20px;
            }
            .logo-img {
                max-width: 150px;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
            .welcome-card {
                padding: 0px 0px 20px 0px;
            }
            .text-column {
                margin: 0 10px;
                padding: 15px;
            }
            .menu-links {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
            }
            .image-link {
                max-width: 120px;
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Left Side Navigation Sidebar -->
    <div class="sidebar">
        <!-- Left side top banner logo -->
        <div class="logo-area">
            <img src="https://web.archive.org/web/20030625160954im_/http://www.sigma-team.net/images/main_pic.JPG" alt="Sigma Team Logo" class="logo-img">
        </div>

        <!-- Buttons Menu -->
        <ul class="menu-links">
            <li>
                <a href="#" class="image-link active">
                    <img src="https://web.archive.org/web/20030625160954im_/http://www.sigma-team.net/images/home_p.jpg" alt="Home" class="custom-btn-img">
                </a>
            </li>
            <li>
                <a href="#" class="image-link">
                    <img src="https://web.archive.org/web/20030625160954im_/http://www.sigma-team.net/images/game_down.jpg" alt="Game" class="custom-btn-img">
                </a>
            </li>
            <li>
                <a href="#" class="image-link">
                    <img src="https://web.archive.org/web/20030625160954im_/http://www.sigma-team.net/images/download_down.jpg" alt="Download" class="custom-btn-img">
                </a>
            </li>
            <li>
                <a href="#" class="image-link">
                    <img src="https://web.archive.org/web/20030625160954im_/http://www.sigma-team.net/images/purchase_down.jpg" alt="Purchase" class="custom-btn-img">
                </a>
            </li>
            <li>
                <a href="#" class="image-link">
                    <img src="https://web.archive.org/web/20030625160954im_/http://www.sigma-team.net/images/about_down.jpg" alt="About" class="custom-btn-img">
                </a>
            </li>
        </ul>
    </div>

    <!-- Right Side Main Content -->
    <div class="main-content">
        <div></div> <!-- Spacer -->

        <!-- Welcome Card Wrapper -->
        <div class="welcome-card">
            <!-- Sigma Animated Logo (Extreme Top Aligned) -->
            <img src="https://web.archive.org/web/20040701220103im_/http://www.sigma-team.net/images/sigma.gif" alt="Sigma Team Logo" class="content-logo-img">
            
            <!-- Dark and Red Text Column (You can edit your main text here) -->
            <div class="text-column">
                <p>Welcome to Sigma Team website!<br>Alien Shooter World Steam Coming Soon</p>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            &copy; Copyright © 2002-2004 Sigma Team. All rights reserved.
        </footer>
    </div>

</body>
</html>
