<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigmaTeam | Free Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d1117; color: #ffffff; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #161b22; padding: 15px 4%; border-bottom: 2px solid #21262d; }
        .nav-logo { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 40px; height: 40px; border-radius: 8px; }
        .logo-text { font-size: 22px; font-weight: 800; text-transform: uppercase; }
        
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #c9d1d9; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 14px; }
        .nav-links a:hover { color: #00d2ff; }

        /* Filter Bar */
        .filter-bar { padding: 20px 4%; display: flex; align-items: center; gap: 15px; background: #161b22; margin-top: 2px; }
        .search-box input { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px 15px; border-radius: 4px; outline: none; width: 220px; text-transform: uppercase; }
        
        .cat-options { display: flex; gap: 10px; }
        .cat-btn { background-color: #21262d; border: 1px solid #30363d; padding: 8px 15px; color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; text-transform: uppercase; }
        .cat-btn:hover { background-color: #30363d; }

        .main-container { padding: 40px 4%; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .game-card { background-color: #161b22; border: 1px solid #21262d; border-radius: 8px; overflow: hidden; padding: 15px; }
        .game-title { font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <img src="https://archive.org/download/dialog_icon_08_202607/dialog_icon_08.png" alt="Logo" class="logo-img">
            <div class="logo-text">SigmaTeam</div>
        </div>
        <nav class="nav-links">
            <a href="#">Store</a>
            <a href="#">Community</a>
            <a href="#">About</a>
            <a href="#">Support</a>
        </nav>
    </header>

    <div class="filter-bar">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchGames()" placeholder="SEARCH GAMES...">
        </div>
        <div class="cat-options">
            <button class="cat-btn">Action</button>
            <button class="cat-btn">Adventure</button>
            <button class="cat-btn">Strategy</button>
            <button class="cat-btn">RPG</button>
        </div>
    </div>

    <main class="main-container">
        <div class="games-grid" id="gamesGrid">
            <!-- Game Cards Here -->
        </div>
    </main>

    <script>
        function searchGames() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.game-title').innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
